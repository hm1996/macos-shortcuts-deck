<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="black" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>macOS Control Center Deck</title>
    <link rel="icon" type="image/png" href="/assets/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/assets/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="/node_modules/swiper/swiper-bundle.min.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="status-bar" aria-label="System status bar">
        <div class="status-brand">
          <span class="pulse" aria-hidden="true"></span>
        </div>

        <div class="status-clock" id="clock" role="button" tabindex="0" aria-label="Date and time — tap to open Calendar">--:--:--</div>

        <div class="status-pill status-pill--bad incident-badge" id="incidentBadge" hidden>
          <span id="incidentCount">0</span>
        </div>

        <div class="status-stream" id="statusStream" aria-live="polite">
          <div class="status-pill status-pill--ok" id="vpnPill">
            <svg class="pill-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3a12 12 0 0 0 8.5 3a12 12 0 0 1 -8.5 15a12 12 0 0 1 -8.5 -15a12 12 0 0 0 8.5 -3" />
              <path d="M9 12l2 2l4 -4" />
            </svg>
            <span>VPN</span>
          </div>
          <div class="status-pill status-pill--warn" id="awsPill">
            <svg class="pill-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6.657 18c-2.572 0 -4.657 -2.007 -4.657 -4.483c0 -2.475 2.085 -4.482 4.657 -4.482c.393 -1.762 1.794 -3.2 3.675 -3.773c1.88 -.572 3.956 -.193 5.444 1c1.488 1.19 2.162 3.007 1.77 4.769h.99c1.913 0 3.464 1.56 3.464 3.486c0 1.927 -1.551 3.487 -3.465 3.487h-11.878" />
            </svg>
            <span>AWS</span>
          </div>
          <div class="status-pill status-pill--ok" id="k8sPill">
            <svg class="pill-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 4m0 1a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v2a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1z" />
              <path d="M3 11m0 1a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v2a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1z" />
              <path d="M7 8l0 .01" />
              <path d="M7 15l0 .01" />
            </svg>
            <span>K8s</span>
          </div>
          <div class="status-pill status-pill--ok" id="gitPill">
            <svg class="pill-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M7 18m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
              <path d="M7 6m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
              <path d="M17 6m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
              <path d="M7 8l0 8" />
              <path d="M9 8c0 2.667 1.333 4 4 4h2" />
            </svg>
            <span>Git</span>
          </div>
        </div>

        <button class="pomodoro-btn" id="pomodoroBtn" type="button" aria-label="Pomodoro timer — tap to start/pause">
          <svg class="pomodoro-icon" id="pomodoroIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 3"/>
          </svg>
          <span id="pomodoroTime">25:00</span>
        </button>

        <div class="status-actions-right">
          <div class="media-strip" id="mediaStrip" hidden>
            <span class="media-strip__track" id="mediaTrackTitle">—</span>
            <span class="media-strip__artist" id="mediaTrackArtist"></span>
            <div class="media-strip__controls">
              <button class="media-btn" data-media-cmd="previous" aria-label="Previous track">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 5v14l-10 -7z M4 5v14"/></svg>
              </button>
              <button class="media-btn" data-media-cmd="playpause" aria-label="Play / Pause">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16l13 -8z"/></svg>
              </button>
              <button class="media-btn" data-media-cmd="next" aria-label="Next track">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5v14l10 -7z M20 5v14"/></svg>
              </button>
            </div>
          </div>
        </div>

        <span class="oncall-indicator" id="oncallIndicator" hidden>
          <span class="oncall-name" id="oncallName"></span>
        </span>
      </header>

      <main class="workspace-stage" aria-label="Active workspace area">
        <div class="swiper" id="workspaceSwiper">
          <div class="swiper-wrapper" id="swiperWrapper"></div>
        </div>
        <div class="swiper-labels" id="swiperLabels"></div>
        <div class="focus-indicator" id="focusIndicator">—</div>
      </main>

      <nav class="shortcuts-bar" aria-label="Persistent shortcuts bar">
        <a class="shortcut-link" href="#" data-action="open-warp" aria-label="Open Warp">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 9l3 3l-3 3" /><path d="M13 15l3 0" />
            <path d="M3 6a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2l0 -12" />
          </svg>
          <span>Warp</span>
        </a>
        <a class="shortcut-link shortcut-link--contextual" href="#" data-action="open-chrome" aria-label="Open Chrome">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 8h16" /><path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -12" /><path d="M8 4v4" />
          </svg>
          <span>Chrome</span>
        </a>
        <a class="shortcut-link" href="#" data-action="open-slack" aria-label="Open Slack">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 9h8" /><path d="M8 13h6" />
            <path d="M9 18h-3a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-3l-3 3l-3 -3" />
          </svg>
          <span>Slack</span>
          <span class="notif-badge" id="notifSlack" hidden>0</span>
        </a>
        <a class="shortcut-link shortcut-link--contextual" href="#" data-action="open-vscode" aria-label="Open VS Code">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M7 8l-4 4l4 4" /><path d="M17 8l4 4l-4 4" /><path d="M14 4l-4 16" />
          </svg>
          <span>VS Code</span>
        </a>
        <a class="shortcut-link" href="#" data-action="open-linear" aria-label="Open Linear">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 5a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -4" />
            <path d="M14 5a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -4" />
            <path d="M4 15a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -4" />
            <path d="M14 15a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -4" />
          </svg>
          <span>Linear</span>
          <span class="notif-badge" id="notifLinear" hidden>0</span>
        </a>
        <a class="shortcut-link" href="#" data-action="open-obsidian" aria-label="Open Obsidian">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 19a9 9 0 0 1 9 0a9 9 0 0 1 9 0" /><path d="M3 6a9 9 0 0 1 9 0a9 9 0 0 1 9 0" />
            <path d="M3 6l0 13" /><path d="M12 6l0 13" /><path d="M21 6l0 13" />
          </svg>
          <span>Obsidian</span>
        </a>
        <a class="shortcut-link shortcut-link--contextual" href="#" data-action="open-vpn" aria-label="Open VPN">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3a12 12 0 0 0 8.5 3a12 12 0 0 1 -8.5 15a12 12 0 0 1 -8.5 -15a12 12 0 0 0 8.5 -3" />
            <path d="M9 12l2 2l4 -4" />
          </svg>
          <span>VPN</span>
        </a>
        <a class="shortcut-link shortcut-link--contextual" href="#" data-action="open-k9s" aria-label="Open K9s">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 9l3 3l-3 3" /><path d="M13 15l3 0" />
            <path d="M3 6a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2l0 -12" />
          </svg>
          <span>K9s</span>
        </a>
        <a class="shortcut-link" href="#" data-action="open-gmail" aria-label="Open Gmail">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10" />
            <path d="M3 7l9 6l9 -6" />
          </svg>
          <span>Gmail</span>
          <span class="notif-badge" id="notifGmail" hidden>0</span>
        </a>
        <a class="shortcut-link shortcut-link--contextual" href="#" data-action="open-aws" aria-label="Open AWS Console">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6.657 18c-2.572 0 -4.657 -2.007 -4.657 -4.483c0 -2.475 2.085 -4.482 4.657 -4.482c.393 -1.762 1.794 -3.2 3.675 -3.773c1.88 -.572 3.956 -.193 5.444 1c1.488 1.19 2.162 3.007 1.77 4.769h.99c1.913 0 3.464 1.56 3.464 3.486c0 1.927 -1.551 3.487 -3.465 3.487h-11.878" />
          </svg>
          <span>AWS</span>
        </a>
        <a class="shortcut-link" href="#" data-action="open-chatgpt" aria-label="Open ChatGPT">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 18a2 2 0 0 1 2 2a2 2 0 0 1 2 -2a2 2 0 0 1 -2 -2a2 2 0 0 1 -2 2m0 -12a2 2 0 0 1 2 2a2 2 0 0 1 2 -2a2 2 0 0 1 -2 -2a2 2 0 0 1 -2 2m-7 12a6 6 0 0 1 6 -6a6 6 0 0 1 -6 -6a6 6 0 0 1 -6 6a6 6 0 0 1 6 6" />
          </svg>
          <span>ChatGPT</span>
        </a>
        <a class="shortcut-link shortcut-link--contextual" href="#" data-action="open-github" aria-label="Open GitHub">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" />
          </svg>
          <span>GitHub</span>
        </a>
        <a class="shortcut-link shortcut-link--contextual" href="#" data-action="open-grafana" aria-label="Open Monitoring">
          <svg class="shortcut-icon shortcut-icon--tabler" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 3v18h18" /><path d="M7 16l4-6 4 3 4-8" />
          </svg>
          <span>Mon</span>
        </a>
      </nav>
    </div>

    <div class="pomodoro-modal" id="pomodoroModal" hidden>
      <div class="pomodoro-modal__backdrop" id="pomodoroModalBackdrop"></div>
      <div class="pomodoro-modal__panel" id="pomodoroModalPanel">
        <div class="pomodoro-modal__phase" id="pomodoroModalPhase" data-phase="work">WORK</div>
        <div class="pomodoro-modal__time" id="pomodoroModalTime">25:00</div>
        <div class="pomodoro-modal__sessions" id="pomodoroModalSessions">Session 1</div>
        <div class="pomodoro-modal__hint" id="pomodoroModalHint">tap to start · double-tap to skip</div>
      </div>
    </div>

    <div class="context-picker" id="contextPicker" hidden>
      <div class="context-picker__backdrop" id="contextPickerBackdrop"></div>
      <div class="context-picker__sheet">
        <div class="context-picker__head">
          <p class="context-picker__title" id="contextPickerTitle"></p>
          <button class="context-picker__refresh-btn" id="contextPickerRefresh" type="button" hidden aria-label="Refresh list">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4" />
              <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4" />
            </svg>
          </button>
        </div>
        <p class="context-picker__age" id="contextPickerAge" hidden></p>
        <div class="context-picker__options" id="contextPickerOptions"></div>
      </div>
    </div>

    <div class="media-detail-modal" id="mediaDetailModal" hidden>
      <div class="media-detail-modal__backdrop" id="mediaDetailBackdrop"></div>
      <div class="media-detail-modal__panel">
        <img class="media-detail-modal__artwork" id="mediaDetailArtwork" src="" alt="" />
        <div class="media-detail-modal__album" id="mediaDetailAlbum">—</div>
        <div class="media-detail-modal__track" id="mediaDetailTrack">—</div>
        <div class="media-detail-modal__artist" id="mediaDetailArtist">—</div>
        <div class="media-detail-modal__progress">
          <div class="media-detail-modal__progress-bar" id="mediaProgressBar"><div class="media-detail-modal__progress-fill" id="mediaProgressFill"></div></div>
          <div class="media-detail-modal__times">
            <span id="mediaTimeCurrent">0:00</span>
            <span id="mediaTimeDuration">0:00</span>
          </div>
        </div>
        <div class="media-detail-modal__controls">
          <button class="media-btn media-btn--large" data-media-cmd="previous" aria-label="Previous track">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 5v14l-10 -7z M4 5v14"/></svg>
          </button>
          <button class="media-btn media-btn--large" data-media-cmd="playpause" aria-label="Play / Pause">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16l13 -8z"/></svg>
          </button>
          <button class="media-btn media-btn--large" data-media-cmd="next" aria-label="Next track">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5v14l10 -7z M20 5v14"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="vol-float" id="volFloat">
      <div class="vol-float__handle" id="volFloatHandle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        <span class="vol-float__val" id="volFloatVal">50</span>
      </div>
      <div class="vol-float__expanded" id="volFloatExpanded" hidden>
        <button class="vol-float-btn" data-vol-cmd="down">–</button>
        <button class="vol-float-btn" data-vol-cmd="mute">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M23 9l-6 6M17 9l6 6"/></svg>
        </button>
        <button class="vol-float-btn" data-vol-cmd="mic-mute" id="micMuteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0 -3 3v8a3 3 0 0 0 6 0v-8a3 3 0 0 0 -3 -3z"/><path d="M19 10v2a7 7 0 0 1 -14 0v-2"/><path d="M12 19v4"/></svg>
        </button>
        <button class="vol-float-btn" data-vol-cmd="up">+</button>
      </div>
    </div>

    <button class="screenshot-float" id="screenshotBtn" aria-label="Screenshot to clipboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2 -2h1l2 -2h8l2 2h1a2 2 0 0 1 2 2v9a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-9"/><path d="M12 15m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/></svg>
    </button>

    <div class="audio-device-picker" id="audioDevicePicker" hidden>
      <div class="audio-device-picker__backdrop" id="audioDeviceBackdrop"></div>
      <div class="audio-device-picker__sheet">
        <p class="audio-device-picker__heading">Audio Output</p>
        <div class="audio-device-picker__list" id="audioOutputList"></div>
        <p class="audio-device-picker__heading">Audio Input</p>
        <div class="audio-device-picker__list" id="audioInputList"></div>
      </div>
    </div>

    <template id="cardTemplate">
      <article class="dcc-card">
        <div class="dcc-card__head">
          <div class="dcc-card__icon-wrap"></div>
          <h3 class="dcc-card__title"></h3>
          <span class="dcc-card__tag"></span>
        </div>
        <p class="dcc-card__value"></p>
        <p class="dcc-card__hint"></p>
      </article>
    </template>

    <div class="dcc-tooltip" id="dccTooltip" hidden>
      <p class="dcc-tooltip__text" id="dccTooltipText"></p>
      <div class="dcc-tooltip__arrow" aria-hidden="true"></div>
    </div>

<script src="/node_modules/swiper/swiper-bundle.min.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/audio.js" defer></script>
    <script src="js/elements.js" defer></script>
    <script src="js/frecency.js" defer></script>
    <script src="js/tooltip.js" defer></script>
    <script src="js/state.js" defer></script>
    <script src="js/pickers.js" defer></script>
    <script src="js/shortcuts.js" defer></script>
    <script src="js/carousel.js" defer></script>
    <script src="js/pomodoro.js" defer></script>
    <script src="js/clock.js" defer></script>
    <script src="js/media.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
